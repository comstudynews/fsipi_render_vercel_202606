services:
  - type: web
    name: fsipi-api
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm ci && npm run build --workspace @fsipi/api
    startCommand: npm run start --workspace @fsipi/api
    healthCheckPath: /api/health
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - apps/api/**
        - package.json
        - package-lock.json
        - .node-version
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false
